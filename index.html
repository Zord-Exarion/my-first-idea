<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스</title>
    <style>
        /* 테마 색상 변수 정의 */
        :root {
            --primary-green: #86efac; /* 연한 녹색 */
            --primary-green-dark: #22c55e; /* 중간 녹색 */
            --secondary-dark: #064e3b; /* 어두운 녹색 (보조 색상) */
            --bg-light: #f0fdf4; /* 아주 연한 녹색 배경 */
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            --header-gradient: linear-gradient(90deg, #10b981, #059669);
            --text-main: #064e3b;
            --text-muted: #374151;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
            background: var(--bg-gradient);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* 헤더 스타일: 녹색 테마 적용 */
        header {
            background: var(--header-gradient);
            color: white;
            padding: 15px 60px;
            box-shadow: 0 4px 12px rgba(6, 78, 59, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1.title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }

        .nav-menu li a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-menu li a:hover {
            color: var(--primary-green);
            transform: translateY(-2px);
        }

        /* 본문 구역 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .section {
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 50px;
            letter-spacing: -1px;
            color: var(--secondary-dark);
        }

        #reviews {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* 컨테이너 스타일 */
        .container {
            text-align: center;
            padding: 60px 100px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(6, 78, 59, 0.05);
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            max-width: 800px;
        }

        .content-text {
            font-size: 44px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1.5px;
            color: var(--secondary-dark);
            line-height: 1.1;
        }

        /* 버튼 스타일: 요청대로 녹색 테마 적용 */
        .btn {
            margin-top: 40px;
            padding: 18px 42px;
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-dark); /* 밝은 녹색 배경에 어두운 텍스트 */
            background-color: var(--primary-green);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(134, 239, 172, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .btn:hover {
            background-color: var(--secondary-dark);
            color: white; /* 어두운 배경에는 흰색 텍스트 */
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(6, 78, 59, 0.4);
        }

        /* 후기 카드 스타일 */
        .review-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            width: 100%;
        }

        .review-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            flex: 1;
            min-width: 350px;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(6, 78, 59, 0.03);
            text-align: left;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid #dcfce7;
        }

        .review-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-green-dark);
            box-shadow: 0 20px 40px rgba(6, 78, 59, 0.08);
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-green);
        }

        .review-comment {
            font-size: 18px;
            font-style: italic;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .review-user {
            margin: 0;
            font-weight: 700;
            color: var(--secondary-dark);
            font-size: 16px;
        }

        /* 푸터 스타일 */
        footer {
            background-color: #f0fdf4;
            color: #166534;
            text-align: center;
            padding: 30px;
            font-size: 14px;
            border-top: 1px solid #dcfce7;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .section { padding: 60px 20px; }
            .review-card { min-width: 100%; }
            .content-text { font-size: 32px; }
            .container { padding: 40px 30px; }
        }
    </style>
</head>

<body>
    <header>
        <h1 class="title">나의 첫 서비스</h1>
        <nav class="nav-menu">
            <ul>
                <li><a href="#features">소개</a></li>
                <li><a href="#reviews">기능</a></li>
                <li><a href="#">문의</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="features" class="section">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="container">
                <h1 id="main-text" class="content-text">오늘도 힘내세요!</h1>
                <button class="btn" id="next-btn">다음 문장 보기</button>
            </div>
        </section>

        <section id="reviews" class="section">
            <h2 class="section-title">무엇을 경험했나요?</h2>
            <div class="review-grid">
                <div class="review-card">
                    <img src="assets/user_male.png" alt="사용자 후기 프로필 사진 1" class="profile-img">
                    <p class="review-comment">"연한 녹색 테마가 마음을 정말 편안하게 해주네요. 눈이 피로하지 않아서 자주 들어오게 됩니다!"</p>
                    <p class="review-user">최** 님 (프리랜서 디자이너)</p>
                </div>
                <div class="review-card">
                    <img src="assets/user_female.png" alt="사용자 후기 프로필 사진 2" class="profile-img">
                    <p class="review-comment">"버튼 클릭할 때 어두운 색으로 변하는 피드백이 확실해서 좋아요. 디자인 완성도가 정말 높습니다."</p>
                    <p class="review-user">김** 님 (콘텐츠 제작자)</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>ⓒ 2025 My Service</p>
    </footer>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('main-text');
        const nextButton = document.getElementById('next-btn');

        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % sentences.length;
            textElement.style.animation = 'none';
            textElement.offsetHeight;
            textElement.style.animation = 'slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
            textElement.textContent = sentences[currentIndex];
            // 이전의 동적 테마 변경 로직은 전체 테마와의 일관성을 위해 제거하거나 녹색 계열로 제한할 수 있습니다.
            // 여기서는 전체 테마의 일관성을 위해 주 색상/보조 색상 체계를 유지합니다.
        });
    </script>
</body>

</html>
