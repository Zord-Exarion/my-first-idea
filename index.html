<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫 번째 아이디어</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 세련된 라이트 그레이 계열의 그라데이션 배경 */
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #1e293b;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 60px 100px;
            /* 완성도 높은 글래스모피즘: 더 미세한 블러와 투명도 조절 */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            /* 정교한 테두리 효과로 카드 경계 강조 */
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            /* 깊이감 있는 멀티 레이어 그림자 */
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.04),
                0 20px 60px rgba(148, 163, 184, 0.1);
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.5);
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.06),
                0 30px 80px rgba(148, 163, 184, 0.2);
            border-color: rgba(255, 255, 255, 1);
        }

        h1 {
            font-size: 44px;
            /* 가독성과 균형을 고려한 최적의 크기 */
            font-weight: 800;
            margin: 0;
            letter-spacing: -1.5px;
            /* 배경과 조화를 이루는 묵직하고 깊은 슬레이트 컬러 */
            color: #1e293b;
            line-height: 1.1;
            /* 아주 미세한 광택 효과 */
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        /* 눈에 잘 띄는 세련된 파란색 버튼 스타일 */
        .btn {
            margin-top: 40px;
            padding: 18px 42px;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            /* 선명하고 생동감 있는 블루 그라데이션 */
            background: linear-gradient(135deg, #0052D4 0%, #4364F7 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 82, 212, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 82, 212, 0.35);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 모바일 화면을 위한 부드러운 반응형 사이즈 조정 */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .container {
                padding: 40px 30px;
            }

            .btn {
                padding: 16px 36px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="main-text">오늘도 힘내세요!</h1>
        <button class="btn" id="next-btn">다음 문장 보기</button>
    </div>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('main-text');
        const nextButton = document.getElementById('next-btn');

        nextButton.addEventListener('click', () => {
            // 인덱스 순환
            currentIndex = (currentIndex + 1) % sentences.length;

            // 텍스트 및 버튼 색상 변경 시 부드러운 애니메이션 재발동
            textElement.style.animation = 'none';
            textElement.offsetHeight; // 리플로우 강제 발생
            textElement.style.animation = 'slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';

            // 텍스트 교체
            textElement.textContent = sentences[currentIndex];

            // 버튼 색상 및 그림자 동적 변경
            updateButtonTheme(currentIndex);
        });

        function updateButtonTheme(index) {
            const themes = [
                { // Blue (Default)
                    bg: 'linear-gradient(135deg, #0052D4 0%, #4364F7 100%)',
                    shadow: 'rgba(0, 82, 212, 0.25)'
                },
                { // Yellow
                    bg: 'linear-gradient(135deg, #f8b500 0%, #fceabb 100%)',
                    shadow: 'rgba(248, 181, 0, 0.25)'
                },
                { // Orange
                    bg: 'linear-gradient(135deg, #FF5A00 0%, #FF9933 100%)',
                    shadow: 'rgba(255, 90, 0, 0.25)'
                },
                { // Green
                    bg: 'linear-gradient(135deg, #1D976C 0%, #93F9B9 100%)',
                    shadow: 'rgba(29, 151, 108, 0.25)'
                }
            ];

            const theme = themes[index];
            nextButton.style.background = theme.bg;
            nextButton.style.boxShadow = `0 10px 25px ${theme.shadow}`;
        }
    </script>
</body>

</html>
