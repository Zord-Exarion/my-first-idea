<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스</title>
    <!-- 한글 가독성이 뛰어난 Pretendard 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 테마 색상 변수 정의 */
        :root {
            --primary-green: #86efac;
            --primary-green-dark: #22c55e;
            --secondary-dark: #064e3b;
            --bg-light: #f0fdf4;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            --header-gradient: linear-gradient(90deg, #10b981, #059669);
            --text-main: #064e3b;
            --text-muted: #4b5563;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            color: var(--text-main);
            background: var(--bg-gradient);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* 헤더 스타일: 데스크탑 기준 */
        header {
            background: var(--header-gradient);
            color: white;
            padding: 15px 60px;
            box-shadow: 0 4px 12px rgba(6, 78, 59, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        header .logo-area {
            display: flex;
            align-items: center;
        }

        header h1.title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.3));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 32px;
        }

        .nav-menu li a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-menu li a:hover {
            color: var(--primary-green);
        }

        /* 본문 구역 및 섹션 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .section {
            padding: 120px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 56px;
            letter-spacing: -0.04em;
            color: var(--secondary-dark);
            text-align: center;
        }

        #reviews {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
        }

        .container {
            text-align: center;
            padding: 70px 100px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            box-shadow: 0 12px 48px rgba(6, 78, 59, 0.05);
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        .content-text {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.05em;
            color: var(--secondary-dark);
            line-height: 1.2;
        }

        .btn {
            margin-top: 48px;
            padding: 20px 48px;
            font-size: 19px;
            font-weight: 700;
            color: var(--secondary-dark);
            background-color: var(--primary-green);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(134, 239, 172, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            outline: none;
        }

        .btn:hover {
            background-color: var(--secondary-dark);
            color: white;
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 20px 40px rgba(6, 78, 59, 0.4);
        }

        .btn:active {
            transform: translateY(-2px) scale(0.95);
        }

        /* 후기 카드 스타일 */
        .review-grid {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1050px;
            width: 100%;
        }

        .review-card {
            background: white;
            padding: 48px;
            border-radius: 32px;
            flex: 1;
            min-width: 320px;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(6, 78, 59, 0.04);
            text-align: left;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 24px;
            border: 1px solid #e2fce9;
        }

        .review-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary-green-dark);
            box-shadow: 0 24px 48px rgba(6, 78, 59, 0.08);
        }

        .profile-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-green);
        }

        .review-comment {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-muted);
            line-height: 1.7;
            word-break: keep-all;
        }

        .review-user {
            margin: 0;
            font-weight: 700;
            color: var(--secondary-dark);
            font-size: 16px;
        }

        footer {
            background-color: #f0fdf4;
            color: #166534;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
            font-weight: 400;
            border-top: 1px solid #dcfce7;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ✅ 모바일 반응형 디자인 최적화 (768px 이하) */
        @media (max-width: 768px) {
            /* 1️⃣ 헤더 메뉴 수직(세로) 정렬 및 중앙 정렬 */
            header {
                flex-direction: column;
                padding: 20px 24px;
                gap: 20px;
                text-align: center;
            }

            header h1.title {
                font-size: 20px;
                justify-content: center;
            }

            .nav-menu ul {
                flex-direction: column; /* 메뉴 항목 세로로 쌓기 */
                gap: 12px;
                width: 100%;
            }

            .nav-menu li {
                width: 100%;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* 미세한 구분선 추가 */
                padding-bottom: 8px;
            }

            .nav-menu li:last-child {
                border-bottom: none;
            }

            .nav-menu li a {
                display: block;
                width: 100%;
                font-size: 15px;
            }

            /* 2️⃣ 본문 섹션 최적화 */
            .section {
                padding: 60px 20px;
            }

            .section-title {
                font-size: 30px;
                margin-bottom: 40px;
            }

            /* 3️⃣ 컨테이너 패딩 조절로 모바일 가독성 확보 */
            .container {
                padding: 40px 24px;
                border-radius: 24px;
            }

            .content-text {
                font-size: 32px;
                letter-spacing: -0.03em;
            }

            .btn {
                margin-top: 36px;
                padding: 16px 40px;
                font-size: 17px;
                width: 100%; /* 모바일에서 버튼 너비 확장 제안 */
                max-width: 300px;
            }

            /* 4️⃣ 후기 카드 자연스럽게 세로 정렬 */
            .review-grid {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .review-card {
                min-width: 100%;
                padding: 32px 24px;
                border-radius: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-area">
            <h1 class="title">
                <svg class="star-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                </svg>
                나의 첫 서비스
            </h1>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#features">소개</a></li>
                <li><a href="#reviews">기능</a></li>
                <li><a href="#">문의</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="features" class="section">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="container">
                <h1 id="main-text" class="content-text">오늘도 힘내세요!</h1>
                <button class="btn" id="next-btn">다음 문장 보기</button>
            </div>
        </section>

        <section id="reviews" class="section">
            <h2 class="section-title">생생한 이용 후기</h2>
            <div class="review-grid">
                <div class="review-card">
                    <img src="assets/user_male.png" alt="사용자 후기 프로필 사진 1" class="profile-img">
                    <p class="review-comment">"새로 바뀐 Pretendard 폰트 덕분에 한글 가독성이 정말 좋아졌네요. 특히 굵은 제목과 일반 본문의 대비가 훌륭합니다."</p>
                    <p class="review-user">최** 님 (프리랜서 디자이너)</p>
                </div>
                <div class="review-card">
                    <img src="assets/user_female.png" alt="사용자 후기 프로필 사진 2" class="profile-img">
                    <p class="review-comment">"눈이 편안한 녹색 테마에 가독성 높은 폰트까지 더해지니 완성도가 완벽해졌어요. 한글이 이렇게 예뻐 보일 수 있나요?"</p>
                    <p class="review-user">김** 님 (콘텐츠 제작자)</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>ⓒ 2025 My Service. All rights reserved.</p>
    </footer>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('main-text');
        const nextButton = document.getElementById('next-btn');

        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % sentences.length;
            textElement.style.animation = 'none';
            textElement.offsetHeight;
            textElement.style.animation = 'slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
            textElement.textContent = sentences[currentIndex];
        });
    </script>
</body>

</html>
